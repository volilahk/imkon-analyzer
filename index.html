<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMKON - Анализатор недвижимости</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080808; color: #E0E0E0; font-family: Inter, sans-serif; min-height: 100vh; }
#app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
.header { padding: 16px 20px 12px; background: #080808; border-bottom: 1px solid #141414; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: "Cormorant Garamond", serif; font-size: 22px; font-weight: 900; color: #F0F0F0; letter-spacing: 4px; }
.logo span { color: #F97316; }
.logo-sub { font-size: 9px; color: #444; letter-spacing: 1.5px; margin-top: 2px; }
.badge { background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.3); color: #F97316; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 6px; letter-spacing: 2px; }
.body { flex: 1; padding: 24px 18px 40px; }
.hero-tag { font-size: 9px; color: #F97316; letter-spacing: 3px; margin-bottom: 12px; font-weight: 700; }
.hero-title { font-family: "Cormorant Garamond", serif; font-size: 34px; font-weight: 900; color: #F0F0F0; line-height: 1.1; margin-bottom: 10px; }
.hero-sub { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 24px; }
textarea { width: 100%; min-height: 150px; background: #0F0F0F; border: 1px solid #1C1C1C; border-radius: 16px; padding: 14px 16px; color: #D0D0D0; font-size: 13px; font-family: Inter, sans-serif; resize: vertical; outline: none; line-height: 1.65; margin-bottom: 14px; }
textarea:focus { border-color: rgba(249,115,22,0.3); }
textarea::placeholder { color: #2A2A2A; }
.btn-main { width: 100%; padding: 17px; background: #F97316; border: none; border-radius: 14px; color: #fff; font-size: 15px; font-weight: 800; cursor: pointer; font-family: Inter, sans-serif; margin-bottom: 28px; transition: all 0.2s; }
.btn-main:hover { background: #EA6A00; transform: translateY(-1px); }
.btn-main:disabled { opacity: 0.35; cursor: default; transform: none; }
.divider { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.divider-line { flex: 1; height: 1px; background: #1A1A1A; }
.divider-text { font-size: 10px; color: #333; letter-spacing: 2px; }
.example { width: 100%; background: #0C0C0C; border: 1px solid #181818; border-radius: 12px; padding: 13px 14px; cursor: pointer; text-align: left; display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; transition: all 0.2s; }
.example:hover { border-color: rgba(249,115,22,0.2); background: #110900; }
.example-dot { width: 6px; height: 6px; border-radius: 50%; background: #F97316; flex-shrink: 0; margin-top: 5px; }
.example-label { font-size: 13px; color: #CCC; font-weight: 600; margin-bottom: 3px; }
.example-preview { font-size: 11px; color: #444; line-height: 1.4; }
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 60px 20px; }
.orb { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #F97316, #C2410C); animation: pulse 2s ease-in-out infinite; }
.loading-text { font-size: 14px; color: #888; letter-spacing: 1px; text-align: center; }
.dots { display: flex; gap: 8px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #F97316; animation: dotpulse 1.2s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
.verdict-card { border-radius: 18px; padding: 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; border: 1.5px solid; }
.verdict-label { font-size: 10px; color: #555; letter-spacing: 2px; margin-bottom: 6px; }
.
verdict-text { font-family: "Cormorant Garamond", serif; font-size: 26px; font-weight: 900; letter-spacing: 2px; line-height: 1; }
.verdict-sub { font-size: 12px; color: #555; margin-top: 6px; }
.score-ring { position: relative; width: 64px; height: 64px; }
.score-ring svg { transform: rotate(-90deg); }
.score-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: "Cormorant Garamond", serif; font-size: 22px; font-weight: 900; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.tag { background: #141414; border: 1px solid #222; color: #999; font-size: 11px; padding: 5px 11px; border-radius: 20px; }
.stats { display: flex; gap: 8px; margin-bottom: 8px; }
.stat { background: #111; border: 1px solid #1C1C1C; border-radius: 14px; padding: 12px 14px; flex: 1; }
.stat-label { font-size: 9px; color: #444; letter-spacing: 2px; margin-bottom: 6px; text-transform: uppercase; }
.stat-value { font-family: "Cormorant Garamond", serif; font-size: 18px; font-weight: 900; color: #E8E8E8; line-height: 1; }
.bar-wrap { background: #111; border: 1px solid #1C1C1C; border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; }
.bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.bar-title { font-size: 10px; color: #555; letter-spacing: 2px; }
.bar-pct { font-size: 15px; font-weight: 800; font-family: "Cormorant Garamond", serif; }
.bar-track { height: 6px; background: #1A1A1A; border-radius: 3px; position: relative; overflow: hidden; }
.bar-mid { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: #333; }
.bar-fill { height: 100%; border-radius: 3px; }
.bar-labels { display: flex; justify-content: space-between; margin-top: 5px; }
.bar-lbl { font-size: 9px; color: #444; letter-spacing: 1px; }
.pros-cons { display: flex; gap: 8px; margin-bottom: 8px; }
.list-card { background: #0F0F0F; border-radius: 14px; padding: 14px 13px; flex: 1; border: 1px solid; }
.list-title { font-size: 9px; letter-spacing: 2px; margin-bottom: 10px; }
.list-item { font-size: 12px; color: #AAA; line-height: 1.55; margin-bottom: 7px; display: flex; align-items: flex-start; gap: 5px; }
.info-card { border-radius: 12px; padding: 16px; margin-bottom: 8px; border: 1px solid; }
.info-title { font-size: 9px; letter-spacing: 2px; margin-bottom: 8px; }
.info-text { font-size: 13px; color: #DDD; line-height: 1.7; }
.btn-reset { width: 100%; margin-top: 12px; background: transparent; border: 1px solid #1E1E1E; color: #555; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 13px; font-family: Inter, sans-serif; transition: all 0.2s; }
.btn-reset:hover { color: #AAA; border-color: #333; }
.error-box { background: #1F0808; border: 1px solid rgba(248,113,113,0.3); color: #F87171; border-radius: 12px; padding: 12px 14px; font-size: 13px; margin-bottom: 12px; }
.fadein { animation: fadein 0.3s ease; }
@keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.1); opacity: 1; } }
@keyframes dotpulse { 0%,100% { opacity: 0.2; transform: scale(0.7); } 50% { opacity: 1; transform: scale(1); } }
@keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="logo">IMKON<span>.</span></div>
      <div class="logo-sub">Анализатор недвижимости · Узбекистан</div>
    </div>
    <div class="badge">AI</div>
  </div>
  <div class="body" id="screen-home">
    <div class="hero-tag">ПРОФЕССИОНАЛЬНАЯ ОЦЕНКА</div>
    <h1 class="hero-title">Вставь текст<br>объявления</h1>
    <p class="hero-sub">ИИ проанализирует локацию, цену, параметры и сравнит с рынком Ташкента</p>
    <textarea id="ad-text" placeholder="Вставь объявление с OLX.uz..."></textarea>
    <div id="error-box" class="error-box" style="display:none"></div>
    <button class="btn-main" id="btn-analyze" onclick="analyze()">Анализировать</button>
<div class="divider"><div class="divider-line"></div><span class="divider-text">примеры</span><div class="divider-line"></div></div>
    <div id="examples"></div>
  </div>
  <div class="body" id="screen-loading" style="display:none">
    <div class="loading">
      <div class="orb"></div>
      <div class="loading-text" id="load-msg">Определяю район и локацию...</div>
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
  </div>
  <div class="body fadein" id="screen-result" style="display:none">
    <div id="result-content"></div>
    <button class="btn-reset" onclick="reset()">Новый анализ</button>
  </div>
</div>
<script>
var SYSTEM_PROMPT = "Ты — старший аналитик рынка недвижимости Узбекистана. Анализируешь объявления с точностью профессионального оценщика.\n\nДАННЫЕ РЫНКА 2024-2025:\nЖИЛАЯ — цены продажи ($/кв.м):\nМирабад, Яккасарай (центр): $1800-3500\nШайхантахур: $1400-2200\nЮнусабад: $900-1600\nМирзо-Улугбек: $850-1400\nЧиланзар: $750-1150\nАлмазар, Хамза: $700-1050\nСергели, Учтепа, Яшнабад: $520-820\n\nКОММЕРЦИЯ — цены продажи ($/кв.м):\n1 линия Амира Тимура, Бродвей: $4000-8000\nЦентр (Мирабад, Яккасарай): $2500-5000\nЮнусабад: $1500-2800\nЧиланзар, Алмазар: $1000-1800\nСергели, окраины: $600-1100\nНовые ЖК (New Life, Origin): $1200-2500\n\nКОММЕРЧЕСКАЯ АРЕНДА ($/кв.м/мес):\n1 линия центр: $25-60\nЦентр: $18-35\nЮнусабад: $12-22\nЧиланзар, Алмазар: $8-15\nСергели, окраины: $4-8\n\nЖИЛАЯ АРЕНДА ($/мес):\n1-комн центр: $400-800, окраина: $180-320\n2-комн центр: $650-1400, окраина: $280-550\n3-комн центр: $1000-2000, окраина: $450-750\n\nОРИЕНТИРЫ: Бродвей, Амира Тимура +30-50%, Пирамид хорошая локация, New Life/Origin +10-20%, метро +10-15%, 1 линия +20-40%, угловое +5-10%, потолки 4м+ +10%, паркинг +10-15%, коробка -15-25%, евроремонт +10-20%.\n\nВерни ТОЛЬКО валидный JSON без markdown:\n{\"verdict\":\"ВЫГОДНО|НОРМА|ПЕРЕОЦЕНЕНО|НЕДООЦЕНЕНО\",\"score\":число 1-10,\"type\":\"Жильё|Коммерция|Аренда\",\"district\":\"район\",\"area_total\":число или null,\"price_total\":число или null,\"price_per_sqm\":число или null,\"market_min\":число,\"market_max\":число,\"deviation_pct\":число,\"monthly_rent_estimate\":число или null,\"annual_yield_pct\":число или null,\"payback_years\":число или null,\"pros\":[],\"cons\":[],\"hidden_risks\":[],\"recommendation\":\"текст\",\"negotiation\":\"текст\",\"fair_price\":число или null}";

var EXAMPLES = [
  { label: "Коммерция · Яккасарай · $2.7M", text: "Продажа коммерческой недвижимости\nЯккасарайский район, ориентир: Пирамид, Первая линия\nЭтаж: 1+2+терасса\nПлощадь: 213 + 349 + 60 кв.м\nСостояние: Коробка\nПаркинг\nПродажа: 2700000 $ (Торг)" },
  { label: "Коммерция · Мирабад · $345K", text: "Продаётся угловое коммерческое помещение в ЖК New Life Mirabad.\nМирабадский район, 1 этаж\nПлощадь: 280 кв.м\nПотолки: 4.15 м\nЦена: 345000 у.е. Торг\n1 кв.м = 1240 у.е." },
  { label: "Квартира · Юнусабад · $95K", text: "Продаётся 2-комнатная квартира в Юнусабаде, 18 квартал.\n58 кв.м, 7/9 этаж, евроремонт, новый дом 2021г.\nЦена $95,000. Торг уместен." },
  { label: "Аренда · Чиланзар · $600/мес", text: "Сдаётся 3-комнатная квартира в Чиланзаре, 7 квартал.\n72 кв.м, мебель и техника, 3/5 этаж. $600/месяц" }
];

var exDiv = document.getElementById("examples");
EXAMPLES.forEach(function(ex) {
  var btn = document.createElement("button");
  btn.className = "example";
  btn.innerHTML = "<div class='example-dot'></div><div><div class='example-label'>" + ex.label + "</div><div class='example-preview'>" + ex.text.slice(0,60) + "...</div></div>";
  btn.onclick = function() { document.getElementById("ad-text").value = ex.text; document.getElementById("btn-analyze").disabled = false; };
  exDiv.appendChild(btn);
});

document.getElementById("ad-text").addEventListener("input", function() {
  document.getElementById("btn-analyze").disabled = !this.value.trim();
});
document.getElementById("btn-analyze").disabled = true;

var loadMsgs = ["Определяю район и локацию...", "Анализирую цену за кв.м...", "Сравниваю с рынком...
", "Считаю доходность...", "Формирую рекомендацию..."];
var loadTimer;

function showScreen(name) {
  ["home","loading","result"].forEach(function(s) {
    document.getElementById("screen-" + s).style.display = s === name ? "block" : "none";
  });
}

function reset() { showScreen("home"); document.getElementById("error-box").style.display = "none"; }

async function analyze() {
  var text = document.getElementById("ad-text").value.trim();
  if (!text) return;
  showScreen("loading");
  var i = 0;
  loadTimer = setInterval(function() { i = (i+1) % loadMsgs.length; document.getElementById("load-msg").textContent = loadMsgs[i]; }, 1800);
  try {
    var res = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: SYSTEM_PROMPT, messages: [{ role: "user", content: "Проанализируй объявление:\n\n" + text }] })
    });
    var data = await res.json();
    var raw = "";
    if (data.content) { for (var j = 0; j < data.content.length; j++) { if (data.content[j].type === "text") { raw = data.content[j].text; break; } } }
    raw = raw.replace(/```json/g, "").replace(/```/g, "").trim();
    var r = JSON.parse(raw);
    renderResult(r);
    showScreen("result");
  } catch(e) {
    showScreen("home");
    var eb = document.getElementById("error-box");
    eb.textContent = "Ошибка анализа. Попробуй ещё раз или добавь больше деталей.";
    eb.style.display = "block";
  }
  clearInterval(loadTimer);
}

function fmt(n) { return n ? n.toLocaleString() : "—"; }

function renderResult(r) {
  var vc = { "ВЫГОДНО": { color: "#4ADE80", bg: "#0A1F0E", border: "rgba(74,222,128,0.2)", icon: "+" }, "НЕДООЦЕНЕНО": { color: "#4ADE80", bg: "#0A1F0E", border: "rgba(74,222,128,0.2)", icon: "◆" }, "НОРМА": { color: "#FACC15", bg: "#1A1600", border: "rgba(250,204,21,0.2)", icon: "=" }, "ПЕРЕОЦЕНЕНО": { color: "#F87171", bg: "#1F0A0A", border: "rgba(248,113,113,0.2)", icon: "!" } };
  var v = vc[r.verdict] || vc["НОРМА"];
  var dev = r.deviation_pct || 0;
  var dc = dev < -8 ? "#4ADE80" : dev > 8 ? "#F87171" : "#FACC15";
  var bp = Math.min(100, Math.max(0, 50 + dev * 0.7));
  var sc = r.score >= 7 ? "#4ADE80" : r.score >= 5 ? "#FACC15" : "#F87171";
  var circ = 2 * Math.PI * 28;
  var fill = (r.score / 10) * circ;

  var tags = [r.type, r.district, r.area_total ? r.area_total.toLocaleString() + " кв.м" : null, r.price_total ? "$" + r.price_total.toLocaleString() : null].filter(Boolean).map(function(t) { return "<span class='tag'>" + t + "</span>"; }).join("");
  var pros = (r.pros || []).map(function(p) { return "<div class='list-item'><span style='color:#4ADE80;flex-shrink:0'>+</span>" + p + "</div>"; }).join("");
  var cons = (r.cons || []).map(function(c) { return "<div class='list-item'><span style='color:#F87171;flex-shrink:0'>-</span>" + c + "</div>"; }).join("");
  var risks = (r.hidden_risks  []).length > 0 ? "<div class='info-card' style='background:#12100A;border-color:rgba(250,204,21,0.15)'><div class='info-title' style='color:#FACC15'>СКРЫТЫЕ РИСКИ</div>" + (r.hidden_risks  []).map(function(x) { return "<div class='list-item'><span style='color:#FACC15;flex-shrink:0'>!</span>" + x + "</div>"; }).join("") + "</div>" : "";
  var yieldRow = r.monthly_rent_estimate ? "<div class='stats'><div class='stat'><div class='stat-label'>Аренда/мес</div><div class='stat-value' style='color:#4ADE80'>$" + fmt(r.monthly_rent_estimate) + "</div></div><div class='stat'><div class='stat-label'>Доходность</div><div class='stat-value' style='color:#4ADE80'>" + (r.annual_yield_pct || "—") + "%</div></div><div class='stat'><div class='stat-label'>Окупаемость</div><div class='stat-value'>" + (r.payback_years ? r.payback_years + " л." : "—") + "</div></div></div>" : "";
  var fairRow = r.fair_price ? "<div class='stats'><div class='stat'><div class='stat-label'>Цена сделки</div><div class='stat-value'>" + (r.price_total ? "$" + fmt(r.
price_total) : "—") + "</div></div><div class='stat'><div class='stat-label'>Справедливая цена</div><div class='stat-value' style='color:#C8A96E'>$" + fmt(r.fair_price) + "</div></div></div>" : "";

  document.getElementById("result-content").innerHTML =
    "<div class='verdict-card fadein' style='background:" + v.bg + ";border-color:" + v.border + "'><div><div class='verdict-label'>ВЕРДИКТ</div><div class='verdict-text' style='color:" + v.color + "'>" + v.icon + " " + r.verdict + "</div><div class='verdict-sub'>" + r.type + " · " + r.district + "</div></div><div class='score-ring'><svg width='64' height='64'><circle cx='32' cy='32' r='28' fill='none' stroke='#1E1E1E' stroke-width='5'/><circle cx='32' cy='32' r='28' fill='none' stroke='" + sc + "' stroke-width='5' stroke-dasharray='" + fill + " " + circ + "' stroke-linecap='round'/></svg><div class='score-num' style='color:" + sc + "'>" + r.score + "</div></div></div>" +
    "<div class='tags fadein'>" + tags + "</div>" +
    "<div class='stats fadein'><div class='stat'><div class='stat-label'>Цена за кв.м</div><div class='stat-value'>" + (r.price_per_sqm ? "$" + fmt(r.price_per_sqm) : "—") + "</div></div><div class='stat'><div class='stat-label'>Рынок</div><div class='stat-value' style='color:#C8A96E'>" + (r.market_min ? "$" + fmt(r.market_min) + "–" + fmt(r.market_max) : "—") + "</div></div></div>" +
    fairRow +
    "<div class='bar-wrap fadein'><div class='bar-header'><span class='bar-title'>ОТКЛОНЕНИЕ ОТ РЫНКА</span><span class='bar-pct' style='color:" + dc + "'>" + (dev > 0 ? "+" : "") + Math.round(dev) + "%</span></div><div class='bar-track'><div class='bar-mid'></div><div class='bar-fill' style='width:" + bp + "%;background:" + dc + "'></div></div><div class='bar-labels'><span class='bar-lbl'>ДЕШЕВЛЕ</span><span class='bar-lbl'>ДОРОЖЕ</span></div></div>" +
    yieldRow +
    "<div class='pros-cons fadein'><div class='list-card' style='border-color:rgba(74,222,128,0.1)'><div class='list-title' style='color:#4ADE80'>ПЛЮСЫ</div>" + pros + "</div><div class='list-card' style='border-color:rgba(248,113,113,0.1)'><div class='list-title' style='color:#F87171'>МИНУСЫ</div>" + cons + "</div></div>" +
    risks +
    "<div class='info-card fadein' style='background:#0D0B00;border-color:rgba(200,169,110,0.15)'><div class='info-title' style='color:#C8A96E'>РЕКОМЕНДАЦИЯ</div><div class='info-text'>" + r.recommendation + "</div></div>" +
    "<div class='info-card fadein' style='background:#0D0800;border-color:rgba(249,115,22,0.15)'><div class='info-title' style='color:#F97316'>ТОРГ</div><div class='info-text'>" + r.negotiation + "</div></div>";
}
</script>
</body>
</html>
